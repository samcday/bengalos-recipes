name: Publish Existing SDM845 Channel

on:
  push:
    branches:
      - bengal-bunny
    paths:
      - .github/scripts/publish-sdm845-channel.sh
      - .github/workflows/publish-existing-sdm845-channel.yml
  workflow_dispatch:
    inputs:
      run_id:
        description: GitHub Actions run ID containing the image artifact
        required: true
        default: "25155607008"
      artifact_name:
        description: Image artifact name to download
        required: true
        default: bengalos-sdm845-development
      fastboop_git_rev:
        description: Optional fastboop git revision to install
        required: false
        default: ""
      skip_cdn_verify:
        description: Skip post-upload CDN CORS/range verification
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish downloaded sdm845 image
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download existing image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name || 'bengalos-sdm845-development' }}
          path: build-sdm845-development
          run-id: ${{ inputs.run_id || '25155607008' }}
          github-token: ${{ github.token }}

      - name: Inspect downloaded artifact
        run: ls -lh build-sdm845-development

      - name: Install fastboop CLI
        env:
          DEFAULT_FASTBOOP_GIT_REV: ${{ vars.FASTBOOP_GIT_REV }}
          FASTBOOP_GIT_REV: ${{ inputs.fastboop_git_rev || '' }}
        run: |
          set -euo pipefail
          rustup toolchain install 1.88.0 --profile minimal
          printf 'not used by channel publishing\n' > "${RUNNER_TEMP}/fastboop-stage0-placeholder"
          export FASTBOOP_STAGE0_EMBED_PATH="${RUNNER_TEMP}/fastboop-stage0-placeholder"
          fastboop_git_rev="${FASTBOOP_GIT_REV:-${DEFAULT_FASTBOOP_GIT_REV:-}}"
          if [ -n "${fastboop_git_rev}" ]; then
            cargo +1.88.0 install --locked --git https://github.com/samcday/fastboop --rev "${fastboop_git_rev}" fastboop-cli
          else
            cargo +1.88.0 install --locked --git https://github.com/samcday/fastboop --branch main fastboop-cli
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Publish fastboop channel to Bunny
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_CDN_BASE_URL: ${{ vars.BUNNY_CDN_BASE_URL }}
          BUNNY_SKIP_CDN_VERIFY: ${{ vars.BUNNY_SKIP_CDN_VERIFY }}
          BUNNY_STORAGE_ACCESS_KEY: ${{ secrets.BUNNY_STORAGE_ACCESS_KEY }}
          BUNNY_STORAGE_HOST: ${{ vars.BUNNY_STORAGE_HOST }}
          BUNNY_STORAGE_ZONE: ${{ vars.BUNNY_STORAGE_ZONE }}
          SKIP_CDN_VERIFY: ${{ inputs.skip_cdn_verify || 'false' }}
        run: |
          set -euo pipefail
          if [ "${SKIP_CDN_VERIFY}" = true ]; then
            export BUNNY_SKIP_CDN_VERIFY=1
          fi
          bash .github/scripts/publish-sdm845-channel.sh build-sdm845-development BengalOS-sdm845
