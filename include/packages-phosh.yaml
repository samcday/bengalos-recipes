{{- $architecture := or .architecture "arm64" -}}
{{- $flavor := or .flavor "phone" -}}

architecture: {{ $architecture }}

actions:
  - action: apt
    recommends: true
    description: Install Phosh packages
    packages:
      - phosh-osk-stub
      - phosh-pim
      - phosh-full

  - action: run
    description: Remove squeekboard
    chroot: true
    command: apt -y remove --purge squeekboard

  - action: apt
    recommends: true
    description: Install additional packages
    packages:
      - less
      - sudo

  - action: run
    description: Disable getty in the Phosh environment
    chroot: true
    command: systemctl disable getty@.service
