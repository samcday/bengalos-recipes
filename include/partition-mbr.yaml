{{- $architecture := or .architecture "arm64" -}}
{{- $filesystem := or .filesystem "ext4" }}
{{- $image := or .image "phosh-$device" -}}
{{- $imagesize := or .imagesize "6GB" }}
{{- $bootstart := or .bootstart "1MiB" }}
{{- $bootonroot := or .bootonroot "false" }}

{{- $rootstart := "512MiB" }}

{{- if eq $bootonroot "true" }}
{{-   $rootstart = $bootstart }}
{{- end }}

{{- $bootend := $rootstart }}

architecture: {{ $architecture }}

actions:
  - action: image-partition
    imagename: {{ $image }}.img
    imagesize: {{ $imagesize }}
    partitiontype: msdos
    mountpoints:
      - mountpoint: /
        partition: rootfs
        options: [ "x-systemd.growfs" ]
{{ if ne $bootonroot "true" }}
      - mountpoint: /boot
        partition: boot
        options: [ "x-systemd.growfs" ]
{{ end }}
    partitions:
{{ if ne $bootonroot "true" }}
      - name: boot
        fs: ext4
        start: {{ $bootstart }}
        end: {{ $bootend }}
        flags: [ boot ]
{{ end }}
      - name: rootfs
        fs: {{ $filesystem }}
        start: {{ $rootstart }}
        end: 100%
