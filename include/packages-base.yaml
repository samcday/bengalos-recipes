{{- $architecture := or .architecture "arm64" -}}
{{- $ssh := or .ssh "" -}}

architecture: {{ $architecture }}

actions:
  - action: apt
    recommends: false
    description: Install base packages
    packages:
# TODO: need a phosh-os-base
# TODO: check librem5-base
      - alsa-ucm-conf
      - alsa-utils
      - apt-utils
      - busybox
      - callaudiod
      - ca-certificates
      - dosfstools
      - e2fsprogs
      - file
      - hwdata
      - kbd
      - locales
      - mmc-utils
      - pipewire-audio
      - plymouth-theme-phosh
      - rtkit
      - usb-modeswitch
      - usbutils
      - wireplumber
      - bluetooth
      - inetutils-ping
      - iptables
      - iw
      - network-manager
      - libspa-0.2-bluetooth
      - rfkill
      - systemd-resolved
      - wireless-regdb
      - wireless-tools
      - wpasupplicant
{{ if $ssh }}
      - openssh-server
{{ end }}
